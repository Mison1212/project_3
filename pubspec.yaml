name: papua_career_center
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.24.2
  cloud_firestore: ^4.14.0
  firebase_auth: ^4.16.0
  firebase_messaging: ^14.7.10
  pdf: ^3.10.7
  printing: ^5.11.0
  flutter_launcher_icons: ^0.14.4
  provider: ^6.0.5
  url_launcher: ^6.1.10
  map_launcher: ^3.0.0
  http: ^1.6.0
  cupertino_icons: ^1.0.8
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_native_splash: ^2.4.0

# Bagian ini harus sejajar di pinggir kiri (tidak menjorok)
flutter_native_splash:
  color: "#ffffff"
  # Sesuai folder assets kamu di bawah, saya arahkan ke assets/icon/image.png
  image: assets/icon/image.png 
  android_12:
    image: assets/icon/image.png
    color: "#ffffff"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/image.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/image.png